<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Roblox Quiz Center – Luyện Thi Lớp 6</title>
<link href="https://fonts.googleapis.com/css2?family=Hoppin:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── ROBLOX STYLE ROOT ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-main:    #191B20;
  --bg-side:    #111216;
  --surface:    #23252B;
  --surface-l:  #2F313A;
  --border:     #393B44;
  --rbx-blue:   #00A2FF;
  --rbx-blue-h: #33B5FF;
  --rbx-green:  #00E676;
  --rbx-red:    #FF3D00;
  --text:       #FFFFFF;
  --text-dim:   #BDC3C7;
  --text-mute:  #7F8C8D;
  --r:          8px;
  --r-sm:       4px;
  --shadow:     0 4px 0px #000000;
  --transition: all 0.1s ease;
}

body {
  background: var(--bg-main);
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  line-height: 1.4;
  -webkit-font-smoothing: antialiased;
}

/* ── LAYOUT CẤU TRÚC SIDEBAR ── */
#app { display: flex; min-height: 100vh; }

.sidebar {
  width: 260px;
  background: var(--bg-side);
  border-right: 2px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 20px 12px;
  flex-shrink: 0;
}

.main-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--bg-main);
  position: relative;
}

.screen { display: none; flex: 1; flex-direction: column; padding: 24px; }
.screen.active { display: flex; }

/* ── ROBLOX BRANDING ── */
.brand {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 30px;
  padding-left: 8px;
}
.brand-logo {
  width: 32px;
  height: 32px;
  background: var(--text);
  transform: rotate(-10deg);
  border-radius: 6px;
  display: inline-block;
  position: relative;
}
.brand-logo::after {
  content: '';
  position: absolute;
  width: 12px; height: 12px;
  background: var(--bg-side);
  top: 10px; left: 10px;
}
.brand-title {
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

/* ── NAV MENU SIDEBAR ── */
.nav-title {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-mute);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
  padding-left: 8px;
}
.nav-menu { display: flex; flex-direction: column; gap: 6px; margin-bottom: 24px; }
.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  background: transparent;
  border: none;
  color: var(--text-dim);
  padding: 12px;
  border-radius: var(--r);
  cursor: pointer;
  font-family: inherit;
  font-size: 15px;
  font-weight: 600;
  text-align: left;
  transition: var(--transition);
}
.nav-item:hover { background: var(--surface); color: var(--text); }
.nav-item.active { background: var(--rbx-blue); color: var(--text); }
.nav-icon { font-size: 18px; }

/* ── HOME / TOME GRID (ROBLOX GAMES GRID) ── */
.section-title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.tome-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
  width: 100%;
}
.tome-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 16px;
  cursor: pointer;
  text-align: left;
  display: flex;
  flex-direction: column;
  position: relative;
  transition: var(--transition);
  box-shadow: 0 4px 0px rgba(0,0,0,0.2);
}
.tome-btn:hover {
  transform: translateY(-2px);
  background: var(--surface-l);
  box-shadow: 0 6px 0px rgba(0,0,0,0.3);
}
.tome-btn:active {
  transform: translateY(2px);
  box-shadow: 0 2px 0px rgba(0,0,0,0.1);
}
.tome-icon { font-size: 28px; margin-bottom: 12px; }
.tome-name { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.tome-school { font-size: 13px; color: var(--text-dim); margin-bottom: 12px; }
.tome-count { font-size: 12px; color: var(--text-mute); font-weight: 500; margin-top: auto; }
.new-badge {
  position: absolute; top: 12px; right: 12px;
  font-size: 10px; font-weight: 700;
  background: var(--rbx-green); color: #000;
  border-radius: 4px; padding: 2px 6px;
}

/* ── QUIZ SCREEN ROBLOX BOX ── */
.quiz-inner { max-width: 800px; width: 100%; margin: 0 auto; }
.quiz-header { display: flex; align-items: center; gap: 16px; margin-bottom: 20px; }
.back-btn {
  background: var(--surface); border: 1px solid var(--border); color: var(--text);
  border-radius: var(--r-sm); padding: 8px 16px; cursor: pointer; font-weight: 600;
  box-shadow: 0 2px 0 #000; transition: var(--transition);
}
.back-btn:active { transform: translateY(2px); box-shadow: none; }
.quiz-title-text { font-size: 18px; font-weight: 700; color: var(--rbx-blue); }

.prog-row { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
.progress-track { flex: 1; height: 12px; background: var(--surface); border-radius: 6px; overflow: hidden; border: 1px solid var(--border); }
.progress-fill { height: 100%; background: var(--rbx-blue); width: 0%; transition: width 0.2s ease; }
.q-counter { font-size: 14px; font-weight: 700; color: var(--text-dim); }

.section-badge { display: inline-block; background: var(--surface-l); font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 4px; margin-bottom: 16px; border: 1px solid var(--border); }

.passage-box { background: var(--bg-side); border: 2px solid var(--border); border-radius: var(--r); padding: 16px; margin-bottom: 20px; color: var(--text-dim); max-height: 200px; overflow-y: auto; white-space: pre-wrap; }
.q-text { font-size: 18px; font-weight: 700; background: var(--surface); border: 2px solid var(--border); border-radius: var(--r); padding: 20px; margin-bottom: 20px; box-shadow: var(--shadow); }

/* Choices */
.choices { display: flex; flex-direction: column; gap: 10px; }
.choice-btn {
  display: flex; align-items: center; gap: 14px; width: 100%; background: var(--surface); border: 2px solid var(--border); border-radius: var(--r); padding: 14px 20px; cursor: pointer; font-size: 16px; font-weight: 600; color: var(--text); text-align: left; transition: var(--transition); box-shadow: var(--shadow);
}
.choice-btn:hover:not(:disabled) { background: var(--surface-l); }
.choice-btn:active:not(:disabled) { transform: translateY(4px); box-shadow: none; }
.choice-label { width: 28px; height: 28px; background: var(--bg-main); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: var(--rbx-blue); flex-shrink: 0; }
.choice-btn.correct { border-color: var(--rbx-green); background: rgba(0,230,118,0.1); }
.choice-btn.correct .choice-label { background: var(--rbx-green); color: #000; }
.choice-btn.wrong { border-color: var(--rbx-red); background: rgba(255,61,0,0.1); }
.choice-btn.wrong .choice-label { background: var(--rbx-red); color: #fff; }

.feedback-msg { margin-top: 16px; padding: 14px; border-radius: var(--r); font-weight: 700; display: none; border: 2px solid transparent; }
.feedback-msg.show { display: block; }
.feedback-msg.correct { background: rgba(0,230,118,0.1); color: var(--rbx-green); border-color: var(--rbx-green); }
.feedback-msg.wrong { background: rgba(255,61,0,0.1); color: var(--rbx-red); border-color: var(--rbx-red); }

.nav-row { display: flex; justify-content: flex-end; margin-top: 16px; }
.next-btn { background: var(--rbx-green); border: none; border-radius: var(--r); padding: 12px 32px; color: #000; font-size: 16px; font-weight: 700; cursor: pointer; display: none; box-shadow: 0 4px 0 #00A152; }
.next-btn.show { display: block; }
.next-btn:active { transform: translateY(4px); box-shadow: none; }

/* ── RESULT SCREEN ── */
#result { align-items: center; justify-content: center; text-align: center; }
.result-inner { max-width: 480px; width: 100%; background: var(--surface); border: 2px solid var(--border); border-radius: var(--r); padding: 32px; box-shadow: var(--shadow); }
.result-orb { font-size: 64px; margin-bottom: 12px; display: block; }
.result-exam-name { font-size: 18px; font-weight: 700; margin-bottom: 8px; color: var(--text-dim); }
.stars-row { font-size: 28px; margin-bottom: 16px; color: #FFD600; }
.result-score { font-size: 48px; font-weight: 800; color: var(--rbx-blue); margin-bottom: 4px; }
.result-pct { font-size: 16px; color: var(--text-mute); margin-bottom: 24px; font-weight: 600; }
.rank-badge { display: inline-block; padding: 8px 20px; border-radius: 6px; font-weight: 700; font-size: 15px; margin-bottom: 24px; background: var(--surface-l); border: 1px solid var(--border); }
.result-actions { display: flex; gap: 12px; justify-content: center; }
.result-btn { padding: 12px 24px; border-radius: var(--r); font-size: 15px; font-weight: 700; cursor: pointer; border: none; transition: var(--transition); }
.btn-retry { background: var(--rbx-blue); color: #fff; box-shadow: 0 4px 0 #007BBF; }
.btn-retry:active { transform: translateY(4px); box-shadow: none; }
.btn-home { background: var(--surface-l); color: var(--text); border: 2px solid var(--border); box-shadow: 0 4px 0 rgba(0,0,0,0.2); }
.btn-home:active { transform: translateY(4px); box-shadow: none; }

/* ── RESPONSIVE MOBILE TWEAKS ── */
@media (max-width: 768px) {
  #app { flex-direction: column; }
  .sidebar { width: 100%; border-right: none; border-bottom: 2px solid var(--border); padding: 14px; }
  .brand { margin-bottom: 12px; }
  .nav-menu { flex-direction: row; overflow-x: auto; padding-bottom: 4px; }
  .nav-item { padding: 8px 14px; white-space: nowrap; }
  .screen { padding: 16px; }
}
</style>
</head>

    <div class="brand">

        <div class="q-text" id="q-text"></div>

        <div class="result-actions">

          <button class="result-btn btn-home"  onclick="goHome()">🏠 Sảnh chính</button>
        </div>
      </div>
    </div>

  </main>
</div>

    {s:"WRITING",q:"They have no books to read at home. → Câu gần nghĩa:",c:["There isn't any books to read at home.","They don't have some books at home.","There are no books for them to read at home.","They doesn't have books at home to read."],a:2},
    {s:"WRITING",q:"Ben scored 90, Susan got 85, Tom had 95. Câu nào ĐÚNG?",c:["Tom had the highest score in the test.","Ben scored lower than both Susan and Tom.","Susan got more points than Tom.","Ben and Susan had the same score."],a:0},
  ]
];

/* ── STATE SYSTEM ── */
let currentCategory = 'eng';
let curExam = 0, questions = [], curQ = 0, score = 0, answered = false;

function $id(id) { return document.getElementById(id); }

/* Fisher-Yates shuffle trộn câu trả lời */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildExam(rawIdx) {
  return RAW[rawIdx].map(q => {
    const pairs = q.c.map((txt, i) => ({ txt, orig: i }));
    const sh    = shuffle(pairs);
    return { s: q.s, q: q.q, c: sh.map(p => p.txt), a: sh.findIndex(p => p.orig === q.a), p: q.p || null };
  });
}

/* KHI CLICK CHUYỂN MÔN (SIDEBAR) */
function switchCategory(cat) {
  currentCategory = cat;
  document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
  if(cat === 'eng') {
    $id('menu-eng').classList.add('active');
    $id('home-category-title').innerHTML = "🇬🇧 Danh Sách Bài Tập Tiếng Anh";
  } else {
    $id('menu-math').classList.add('active');
    $id('home-category-title').innerHTML = "📐 Danh Sách Bài Tập Toán Học";
  }
  renderExamList();
  goHome();
}

/* RENDER DANH SÁCH BÀI TẬP THEO MÔN ĐANG CHỌN */
function renderExamList() {
  const grid = $id('exam-list-grid');
  grid.innerHTML = '';
  
  const filtered = EXAM_REGISTRY.filter(item => item.cat === currentCategory);
  
  filtered.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'tome-btn';
    
    let clickAction = '';
    if (item.type === 'link') {
      clickAction = `window.open('${item.url}', '_blank')`;
    } else {
      clickAction = `startExam(${item.id}, ${item.rawIndex})`;
    }
    btn.setAttribute('onclick', clickAction);

    let html = '';
    if (item.isNew) {
      html += `<span class="new-badge">Mới</span>`;
    }
    html += `
      <span class="tome-icon">${item.icon}</span>
      <div class="tome-name">${item.name}</div>
      <div class="tome-school">${item.school}</div>
      <div class="tome-count">${item.info}</div>
    `;
    btn.innerHTML = html;
    grid.appendChild(btn);
  });
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $id(id).classList.add('active');
}

/* BẮT ĐẦU LÀM BÀI TRONG HỆ THỐNG */
function startExam(id, rawIdx) {
  curExam = id;
  const config = EXAM_REGISTRY.find(x => x.id === id);
  questions = buildExam(rawIdx);
  curQ = 0; score = 0;
  $id('quiz-title').textContent = config.name + " – " + config.school;
  showScreen('quiz');
  renderQ();
}

function renderQ() {
  const q = questions[curQ], total = questions.length;

  $id('progress-fill').style.width = ((curQ / total) * 100) + '%';
  $id('q-counter').textContent = (curQ + 1) + ' / ' + total;
  $id('section-badge').textContent = q.s;

  const pw = $id('passage-wrap'), pb = $id('passage-box');
  if (q.p) { pw.style.display = 'block'; pb.textContent = q.p; pb.scrollTop = 0; }
  else      { pw.style.display = 'none'; }

  $id('q-text').textContent = q.q;

  const el = $id('choices'); el.innerHTML = '';
  ['A','B','C','D'].forEach((L, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-label">${L}</span><span class="choice-text">${q.c[i]}</span>`;
    btn.onclick = () => pick(i);
    el.appendChild(btn);
  });

  $id('feedback').className = 'feedback-msg';
  $id('next-btn').className  = 'next-btn';
  answered = false;
}

function pick(idx) {
  if (answered) return;
  answered = true;
  const q    = questions[curQ];
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled = true);
  const fb = $id('feedback');
  
  if (idx === q.a) {
    btns[idx].classList.add('correct');
    score++;
    fb.textContent = '🟢 CHÍNH XÁC! Bạn nhận được +1 điểm thưởng.';
    fb.className = 'feedback-msg correct show';
  } else {
    btns[idx].classList.add('wrong');
    btns[q.a].classList.add('correct');
    fb.textContent = '🔴 CHƯA ĐÚNG. Đáp án chính xác là ' + ['A','B','C','D'][q.a] + '.';
    fb.className = 'feedback-msg wrong show';
  }
  $id('next-btn').className = 'next-btn show';
}

function nextQ() {
  curQ++;
  if (curQ >= questions.length) showResult(); else renderQ();
}

function showResult() {
  const total = questions.length, pct = Math.round((score / total) * 100);
  const config = EXAM_REGISTRY.find(x => x.id === curExam);
  showScreen('result');
  $id('r-name').textContent  = config.name;
  $id('r-score').textContent = score + ' / ' + total;
  $id('r-pct').textContent   = 'TỶ LỆ HOÀN THÀNH: ' + pct + '%';

  const stars = pct >= 90 ? 5 : pct >= 75 ? 4 : pct >= 60 ? 3 : pct >= 40 ? 2 : 1;
  $id('r-stars').innerHTML = Array.from({length:5}, (_,i) => i < stars ? '⭐' : '☆').join('');

  let orb, rank;
  if      (pct >= 90) { orb='🏆'; rank='BẬC THẦY ROBLOX'; }
  else if (pct >= 75) { orb='🥇'; rank='CAO THỦ'; }
  else if (pct >= 60) { orb='🥈'; rank='CHUYÊN NGHIỆP'; }
  else if (pct >= 40) { orb='🥉'; rank='THÀNH VIÊN'; }
  else                { orb='☠️'; rank='TẬP SỰ MỚI'; }

  $id('r-orb').textContent = orb;
  $id('r-rank').textContent = '⚔️ ' + rank + ' ⚔️';
}

function retryExam() { 
  const config = EXAM_REGISTRY.find(x => x.id === curExam);
  startExam(curExam, config.rawIndex); 
}
function goHome() { showScreen('home'); }

// Khởi chạy mặc định nạp dữ liệu tiếng Anh ban đầu
window.onload = function() {
  renderExamList();
};
</script>
