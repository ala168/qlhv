<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>code</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 22px;
        }
        .time-display {
            font-size: 15px;
            font-weight: bold;
            color: #3498db;
            margin-bottom: 25px;
            background-color: #e8f4f8;
            padding: 6px 14px;
            border-radius: 20px;
            display: inline-block;
        }
        .passcode-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            border-radius: 10px;
            background-color: #f8f9fa;
            border: 1px solid #e2e8f0;
        }
        .label-text {
            font-weight: 600;
            font-size: 16px;
            color: #4a5568;
            margin-bottom: 10px;
        }
        .code {
            font-family: 'Courier New', Courier, monospace;
            font-size: 36px;
            font-weight: bold;
            letter-spacing: 4px;
            color: #2c3e50;
            margin-bottom: 15px;
        }
        .btn-copy {
            background-color: #34495e;
            color: white;
            border: none;
            padding: 8px 24px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-copy:hover {
            background-color: #2c3e50;
        }
        .btn-copy.copied {
            background-color: #2ecc71;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Mã Passcode</h2>
    <div class="time-display" id="currentTime">--:--:--</div>

    <div class="passcode-card">
        <span class="code" id="passcode3">0000</span>
        <button class="btn-copy" onclick="copyCode(this)">Copy</button>
    </div>
</div>

<script>
    // Cấu hình ngầm Số Bí Mật tại đây
    const SECRET_KEY = 26;

    function updatePasscode() {
        let now = new Date();
        
        // Cập nhật đồng hồ hiển thị (HH:MM:SS)
        let hoursStr = String(now.getHours()).padStart(2, '0');
        let minutesStr = String(now.getMinutes()).padStart(2, '0');
        let secondsStr = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('currentTime').innerText = `${hoursStr}:${minutesStr}:${secondsStr}`;

        // Tính toán riêng cho Passcode 3 (+1 phút so với hiện tại)
        let passcode3Time = new Date(now.getTime() + 1 * 60 * 1000);
        
        let h = passcode3Time.getHours();
        let m = passcode3Time.getMinutes();
        
        let codeH = (h*3 + SECRET_KEY) % 100;
        let codeM = (m + SECRET_KEY) % 100;
        
        let finalCode = String(codeH).padStart(2, '0') + String(codeM).padStart(2, '0');
        
        // Cập nhật lên giao diện
        document.getElementById('passcode3').innerText = finalCode;
    }

    // Hàm xử lý Copy mã
    function copyCode(button) {
        let codeText = document.getElementById('passcode3').innerText;
        
        navigator.clipboard.writeText(codeText).then(() => {
            button.innerText = "Copied!";
            button.classList.add('copied');
            
            setTimeout(() => {
                button.innerText = "Copy Passcode";
                button.classList.remove('copied');
            }, 1500);
        }).catch(err => {
            console.error('Không thể copy mã: ', err);
        });
    }

    // Khởi chạy
    updatePasscode();
    setInterval(updatePasscode, 1000);
</script>

</body>
</html>
