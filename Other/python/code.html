<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passcode</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 22px;
        }
        .time-display {
            font-size: 15px;
            font-weight: bold;
            color: #2980b9;
            margin-bottom: 25px;
            background-color: #e1f5fe;
            padding: 6px 14px;
            border-radius: 20px;
            display: inline-block;
            transition: all 0.5s ease;
        }
        /* Style cảnh báo khi thời gian còn lại dưới 15 giây */
        .time-display.warning {
            color: #c0392b;
            background-color: #fadbd8;
            animation: pulse 1s infinite;
        }
        .passcode-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px 20px;
            border-radius: 10px;
            background-color: #f8f9fa;
            border: 1px solid #e2e8f0;
        }
        .code {
            font-family: 'Courier New', Courier, monospace;
            font-size: 42px;
            font-weight: bold;
            letter-spacing: 4px;
            color: #2c3e50;
            margin-bottom: 20px;
            line-height: 1;
        }
        .btn-copy {
            background-color: #34495e;
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-copy:hover {
            background-color: #2c3e50;
        }
        .btn-copy.copied {
            background-color: #2ecc71;
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Passcode</h2>
    <div class="time-display" id="currentTime">--:--</div>

    <div class="passcode-card">
        <span class="code" id="blockPasscode">0000</span>
        <button class="btn-copy" onclick="copyCode(this)">Copy Passcode</button>
    </div>
</div>

<script>
    // Cấu hình ngầm Số Bí Mật
    const SECRET_KEY = 26;

    function updatePasscodeAndCountdown() {
        let now = new Date();
        let m = now.getMinutes();
        let s = now.getSeconds();
        
        // 1. TÍNH TOÁN THỜI GIAN CÒN LẠI (COUNTDOWN)
        // Tổng số giây tính từ đầu chu kỳ 2 phút hiện tại
        let elapsedSeconds = (m % 2) * 60 + s;
        // Số giây còn lại cho đến khi hết chu kỳ 2 phút (120 giây)
        let remainingSeconds = 120 - elapsedSeconds;
        
        let countdownMin = Math.floor(remainingSeconds / 60);
        let countdownSec = remainingSeconds % 60;
        
        // Định dạng hiển thị chuỗi mm:ss
        let minStr = String(countdownMin).padStart(2, '0');
        let secStr = String(countdownSec).padStart(2, '0');
        
        let timerElement = document.getElementById('currentTime');
        timerElement.innerText = `${minStr}:${secStr}`;
        
        // Hiệu ứng cảnh báo trực quan nếu thời gian còn lại dưới 15 giây
        if (remainingSeconds <= 15) {
            timerElement.classList.add('warning');
        } else {
            timerElement.classList.remove('warning');
        }

        // 2. TÍNH TOÁN PASSCODE (Cập nhật đồng bộ theo chu kỳ)
        let h = now.getHours();
        let timeBlock = Math.floor(m / 2);
        
        let firstPart = (h * 7 + timeBlock + SECRET_KEY) % 100;
        let secondPart = (firstPart * 3 + timeBlock * 5) % 100;
        
        let finalCode = String(firstPart).padStart(2, '0') + String(secondPart).padStart(2, '0');
        
        document.getElementById('blockPasscode').innerText = finalCode;
    }

    // Hàm xử lý Copy mã
    function copyCode(button) {
        let codeText = document.getElementById('blockPasscode').innerText;
        
        navigator.clipboard.writeText(codeText).then(() => {
            button.innerText = "Copied!";
            button.classList.add('copied');
            
            setTimeout(() => {
                button.innerText = "Copy Passcode";
                button.classList.remove('copied');
            }, 1500);
        }).catch(err => {
            console.error('Lỗi khi copy mã: ', err);
        });
    }

    // Khởi chạy hệ thống
    updatePasscodeAndCountdown();
    setInterval(updatePasscodeAndCountdown, 1000);
</script>

</body>
</html>
