<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passcode</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 350px;
            text-align: center;
        }
        h2 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 22px;
        }
        .time-display {
            font-size: 15px;
            font-weight: bold;
            color: #e67e22;
            margin-bottom: 25px;
            background-color: #fdf2e9;
            padding: 6px 14px;
            border-radius: 20px;
            display: inline-block;
        }
        .passcode-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 25px 20px;
            border-radius: 10px;
            background-color: #f8f9fa;
            border: 1px solid #e2e8f0;
        }
        .code {
            font-family: 'Courier New', Courier, monospace;
            font-size: 42px;
            font-weight: bold;
            letter-spacing: 4px;
            color: #d35400;
            margin-bottom: 20px;
            line-height: 1;
        }
        .btn-copy {
            background-color: #34495e;
            color: white;
            border: none;
            padding: 10px 24px;
            font-size: 14px;
            font-weight: 500;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            box-sizing: border-box;
        }
        .btn-copy:hover {
            background-color: #2c3e50;
        }
        .btn-copy.copied {
            background-color: #2ecc71;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Passcode</h2>
    <div class="time-display" id="currentTime">--:--:--</div>

    <div class="passcode-card">
        <span class="code" id="blockPasscode">0000</span>
        <button class="btn-copy" onclick="copyCode(this)">Copy Passcode</button>
    </div>
</div>

<script>
    // Cấu hình ngầm Số Bí Mật
    const SECRET_KEY = 26;

    function updatePasscode() {
        let now = new Date();
        
        // 1. Hiển thị đồng hồ thời gian thực
        let hoursStr = String(now.getHours()).padStart(2, '0');
        let minutesStr = String(now.getMinutes()).padStart(2, '0');
        let secondsStr = String(now.getSeconds()).padStart(2, '0');
        document.getElementById('currentTime').innerText = `${hoursStr}:${minutesStr}:${secondsStr}`;

        let h = now.getHours();
        let m = now.getMinutes();
        
        // 2. Chia lấy nguyên để ép thời gian vào block 2 phút cố định
        let timeBlock = Math.floor(m / 2);
        
        // 3. Thực thi thuật toán biến đổi phi tuyến tính
        let firstPart = (h * 7 + timeBlock + SECRET_KEY) % 100;
        let secondPart = (firstPart * 3 + timeBlock * 5) % 100;
        
        // Định dạng chuỗi đủ 4 ký tự
        let finalCode = String(firstPart).padStart(2, '0') + String(secondPart).padStart(2, '0');
        
        // Cập nhật lên giao diện
        document.getElementById('blockPasscode').innerText = finalCode;
    }

    // Hàm xử lý Copy mã
    function copyCode(button) {
        let codeText = document.getElementById('blockPasscode').innerText;
        
        navigator.clipboard.writeText(codeText).then(() => {
            button.innerText = "Copied!";
            button.classList.add('copied');
            
            setTimeout(() => {
                button.innerText = "Copy Passcode";
                button.classList.remove('copied');
            }, 1500);
        }).catch(err => {
            console.error('Lỗi khi copy mã: ', err);
        });
    }

    // Khởi chạy hệ thống
    updatePasscode();
    setInterval(updatePasscode, 1000);
</script>

</body>
</html>
