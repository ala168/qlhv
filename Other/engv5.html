<!DOCTYPE html>

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body {
            font-family: 'Inter', sans-serif;
            background-color: #FDFBF7;
            color: #374151;
        }
        .chart-container {
            position: relative;
            width: 100%;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            height: 300px;
            max-height: 350px;
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #F3F4F6;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #D1D5DB;

        }
        .question-card {
            transition: all 0.3s ease;
        }
        .option-btn {
            transition: all 0.2s ease;
        }

<body class="min-h-screen">

        1. Dashboard Tổng quan: Hiển thị tiến độ làm bài và điểm số qua biểu đồ Chart.js.
        2. Navigation Sidebar: Cho phép người dùng nhảy nhanh đến các phần (Phát âm, Ngữ pháp, Đọc hiểu...).
        3. Main Quiz Area: Hiển thị các câu hỏi dưới dạng thẻ (Card). Đối với các câu có bài đọc, toàn bộ văn bản được nhúng trực tiếp trong Card.

        Lý do: Cấu trúc này giúp học sinh tiểu học dễ dàng theo dõi toàn bộ nội dung mà không bị phân tâm bởi việc chuyển trang, đồng thời bài đọc xuất hiện tại mọi câu hỏi liên quan giúp duy trì mạch tư duy.
    -->
    <!-- Visualization & Content Choices: 
        - Progress Pie Chart (Chart.js): Theo dõi số câu đã làm/chưa làm.
        - Performance Bar Chart (Chart.js): Phân tích tỉ lệ đúng theo từng kỹ năng (Grammar, Vocabulary, Reading).

        - Navigation: JS handle smooth scrolling và active state.
        - Confirmation: NO SVG graphics used. NO Mermaid JS used.

        let userAnswers = new Array(quizData.questions.length).fill(null);
        let scoreChart;

        function initQuiz() {
            const container = document.getElementById('quiz-container');
            let currentSection = "";

            quizData.questions.forEach((q, index) => {
                if (q.section !== currentSection) {
                    currentSection = q.section;
                    const sectionHeader = document.createElement('div');
                    sectionHeader.id = q.section;
                    sectionHeader.className = "pt-8 mb-4 border-b-2 border-indigo-100";
                    sectionHeader.innerHTML = `<h2 class="text-2xl font-bold text-indigo-900 pb-2">${q.sectionName}</h2>`;
                    container.appendChild(sectionHeader);
                    
                    // Introductory paragraph for each section
                    const intro = document.createElement('p');
                    intro.className = "text-stone-500 mb-6 italic";
                    intro.innerText = `Phần này giúp học sinh ôn luyện kỹ năng ${q.sectionName.toLowerCase()} thông qua các dạng bài tập thực tế từ đề thi THCS Thanh Xuân.`;
                    container.appendChild(intro);
                }

                const card = document.createElement('div');
                card.className = "question-card bg-white p-6 rounded-2xl shadow-sm border border-stone-100 mb-8";
                
                let passageHtml = "";
                if (q.type === 'passage') {
                    passageHtml = `
                        <div class="passage-box p-4 mb-4 rounded-lg text-sm leading-relaxed text-stone-700">
                            ${q.passage}
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <span class="bg-indigo-50 text-indigo-700 text-xs font-bold px-2 py-1 rounded">CÂU ${q.id}</span>
                        <button onclick="showHint(${index})" class="text-xs text-amber-600 font-medium hover:underline">Gợi ý 💡</button>
                    </div>
                    ${passageHtml}
                    <div class="text-lg font-medium mb-6 text-stone-800 leading-snug">${q.question.replace(/\n/g, '<br>')}</div>
                    <div id="options-${index}" class="grid grid-cols-1 md:grid-cols-2 gap-3">
                        ${q.options.map((opt, i) => `
                            <button onclick="selectOption(${index}, ${i})" class="option-btn text-left p-4 rounded-xl border border-stone-200 hover:border-indigo-300 hover:bg-indigo-50 transition-all">
                                <span class="font-bold text-stone-400 mr-2">${String.fromCharCode(65 + i)}.</span> ${opt}
                            </button>
                        `).join('')}
                    </div>
                    <div id="hint-${index}" class="hidden mt-4 p-3 bg-amber-50 text-amber-800 text-sm rounded-lg border border-amber-100">
                        <strong>Gợi ý:</strong> ${q.hint}
                    </div>
                    <div id="feedback-${index}" class="hidden mt-4 p-4 rounded-xl">
                        <p id="result-text-${index}" class="font-bold mb-1"></p>
                        <p class="text-sm opacity-90">${q.rationale}</p>
                    </div>
                `;
                container.appendChild(card);
            });

            initCharts();
        }

        function selectOption(qIdx, oIdx) {
            if (userAnswers[qIdx] !== null) return;

            userAnswers[qIdx] = oIdx;
            const correct = quizData.questions[qIdx].correct;
            const feedback = document.getElementById(`feedback-${qIdx}`);
            const resultText = document.getElementById(`result-text-${qIdx}`);
            const optionsDiv = document.getElementById(`options-${qIdx}`);
            const buttons = optionsDiv.getElementsByTagName('button');

            feedback.classList.remove('hidden');
            
            if (oIdx === correct) {
                feedback.className = "mt-4 p-4 rounded-xl bg-emerald-50 text-emerald-800 border border-emerald-100";
                resultText.innerText = "Chính xác! 🎉";
                buttons[oIdx].className = "option-btn text-left p-4 rounded-xl border-2 border-emerald-500 bg-emerald-50 transition-all font-semibold";
            } else {
                feedback.className = "mt-4 p-4 rounded-xl bg-rose-50 text-rose-800 border border-rose-100";
                resultText.innerText = "Chưa đúng rồi... ✍️";
                buttons[oIdx].className = "option-btn text-left p-4 rounded-xl border-2 border-rose-500 bg-rose-50 transition-all font-semibold";
                buttons[correct].className = "option-btn text-left p-4 rounded-xl border-2 border-emerald-500 bg-emerald-50 transition-all font-semibold";
            }

            updateProgress();
            updateCharts();
        }

        function showHint(index) {
            const hintBox = document.getElementById(`hint-${index}`);
            hintBox.classList.toggle('hidden');
        }

        function updateProgress() {
            const total = quizData.questions.length;
            const answered = userAnswers.filter(a => a !== null).length;
            const progress = (answered / total) * 100;
            
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('progress-text').innerText = `${answered}/${total} câu`;
            
            const score = userAnswers.reduce((acc, curr, idx) => {
                return curr === quizData.questions[idx].correct ? acc + 1 : acc;
            }, 0);
            document.getElementById('final-score').innerText = score;
        }

        function scrollToSection(id) {
            document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
        }

        function initCharts() {
            const ctx = document.getElementById('scoreChart').getContext('2d');
            scoreChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Đúng', 'Sai', 'Chưa làm'],
                    datasets: [{
                        data: [0, 0, 35],
                        backgroundColor: ['#10B981', '#EF4444', '#E5E7EB'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } }
                    },
                    cutout: '70%'
                }
            });
        }

        function updateCharts() {
            const correct = userAnswers.reduce((acc, curr, idx) => curr === quizData.questions[idx].correct ? acc + 1 : acc, 0);
            const answered = userAnswers.filter(a => a !== null).length;
            const incorrect = answered - correct;
            const remaining = quizData.questions.length - answered;

            scoreChart.data.datasets[0].data = [correct, incorrect, remaining];
            scoreChart.update();
        }

        window.onload = initQuiz;
    </script>
