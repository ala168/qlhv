<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Arcane Quiz – Tiếng Anh Lớp 6</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
/* ── RESET & ROOT ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #080613;
  --bg2:       #0f0b20;
  --surface:   #13102a;
  --card:      #1c1735;
  --card2:     #231d42;
  --border:    #3d2f6e;
  --border-l:  #5a4494;
  --gold:      #c8991f;
  --gold-l:    #f0c84a;
  --gold-d:    #8a6610;
  --purple:    #8b46f5;
  --purple-l:  #b87fff;
  --purple-d:  #5c2db5;
  --teal:      #2dd4bf;
  --text:      #ede6ff;
  --text-dim:  #a898cc;
  --text-mute: #6b5c8e;
  --ok:        #22c55e;
  --ok-bg:     rgba(34,197,94,.12);
  --bad:       #f43f5e;
  --bad-bg:    rgba(244,63,94,.12);
  --r:         14px;
  --r-sm:      9px;
  --shadow:    0 8px 32px rgba(0,0,0,.5);
}

html { height: 100%; scroll-behavior: smooth; }
body {
  min-height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: 'Crimson Pro', Georgia, serif;
  font-size: 17px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}

/* ── ANIMATED BG ── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 70% 50% at 15% 20%, rgba(139,70,245,.13) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 85% 80%, rgba(200,153,31,.09) 0%, transparent 60%),
    radial-gradient(ellipse 40% 60% at 50% 50%, rgba(45,212,191,.05) 0%, transparent 70%);
}

/* Stars */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 72% 12%, rgba(255,255,255,.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 40% 60%, rgba(255,255,255,.4) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 45%, rgba(255,255,255,.5) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 28% 82%, rgba(200,153,31,.7) 0%, transparent 100%),
    radial-gradient(1px 1px at 60% 35%, rgba(255,255,255,.35) 0%, transparent 100%),
    radial-gradient(1px 1px at 5%  70%, rgba(255,255,255,.4) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 80% 90%, rgba(139,70,245,.6) 0%, transparent 100%);
}

/* ── SCREENS ── */
#app { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; }
.screen { display: none; flex: 1; flex-direction: column; }
.screen.active { display: flex; }

/* ══════════════════════════════════════════
   HOME SCREEN
══════════════════════════════════════════ */
#home {
  align-items: center;
  justify-content: center;
  padding: clamp(1.5rem, 5vw, 3rem) clamp(1rem, 4vw, 2rem) clamp(2rem, 6vw, 4rem);
  text-align: center;
  min-height: 100vh;
}

.home-sigil {
  font-size: clamp(3rem, 10vw, 5rem);
  margin-bottom: .75rem;
  display: block;
  filter: drop-shadow(0 0 20px var(--purple)) drop-shadow(0 0 40px var(--purple-d));
  animation: float 4s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-10px); }
}

.home-title {
  font-family: 'Cinzel', serif;
  font-size: clamp(1.6rem, 6vw, 2.8rem);
  font-weight: 700;
  background: linear-gradient(135deg, var(--gold-l) 0%, var(--purple-l) 55%, var(--teal) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: .1em;
  margin-bottom: .3rem;
  line-height: 1.1;
}

.home-sub {
  font-size: clamp(.8rem, 2.5vw, 1rem);
  color: var(--text-dim);
  letter-spacing: .08em;
  margin-bottom: .5rem;
  font-style: italic;
}

.rune-divider {
  color: rgba(139,70,245,.4);
  letter-spacing: .5em;
  font-size: 1rem;
  margin: .75rem 0;
  user-select: none;
}

.home-hint {
  font-size: clamp(.75rem, 2vw, .88rem);
  color: var(--text-mute);
  margin-bottom: 1.5rem;
  font-style: italic;
}
.home-hint span { color: var(--gold); }

/* TOME GRID */
.tome-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
  gap: clamp(.6rem, 2vw, .9rem);
  width: 100%;
  max-width: 580px;
}

.tome-btn {
  position: relative;
  background: linear-gradient(160deg, var(--card2) 0%, var(--card) 100%);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: clamp(1rem, 3vw, 1.4rem) clamp(.75rem, 2vw, 1rem);
  cursor: pointer;
  transition: transform .22s cubic-bezier(.34,1.56,.64,1), box-shadow .22s, border-color .22s;
  text-align: center;
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
}
.tome-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(139,70,245,.18) 0%, transparent 70%);
  pointer-events: none;
}
.tome-btn:hover, .tome-btn:active {
  border-color: var(--purple-l);
  transform: translateY(-4px) scale(1.02);
  box-shadow: 0 10px 30px rgba(139,70,245,.25), 0 0 0 1px var(--purple-d);
}
.tome-btn.gold-tome { border-color: var(--gold-d); }
.tome-btn.gold-tome:hover, .tome-btn.gold-tome:active {
  border-color: var(--gold);
  box-shadow: 0 10px 30px rgba(200,153,31,.25), 0 0 0 1px var(--gold-d);
}
.new-badge {
  position: absolute; top: 7px; right: 8px;
  font-size: .55rem; font-weight: 700; letter-spacing: .06em;
  background: rgba(200,153,31,.18);
  color: var(--gold-l);
  border: 1px solid rgba(200,153,31,.4);
  border-radius: 20px;
  padding: 2px 7px;
  font-family: 'Cinzel', serif;
}
.tome-icon { font-size: clamp(1.6rem, 4vw, 2rem); margin-bottom: .4rem; display: block; }
.tome-name {
  font-family: 'Cinzel', serif;
  font-size: clamp(.65rem, 2vw, .78rem);
  color: var(--gold-l);
  letter-spacing: .1em;
  font-weight: 600;
  margin-bottom: .2rem;
}
.tome-school { font-size: clamp(.6rem, 1.8vw, .7rem); color: var(--text-dim); font-style: italic; }
.tome-count  { font-size: clamp(.58rem, 1.6vw, .65rem); color: var(--text-mute); margin-top: .2rem; }

/* ══════════════════════════════════════════
   QUIZ SCREEN
══════════════════════════════════════════ */
#quiz { overflow-y: auto; }
.quiz-inner {
  max-width: 700px;
  margin: 0 auto;
  padding: clamp(.75rem, 3vw, 1.25rem) clamp(.85rem, 3.5vw, 1.5rem) clamp(2rem, 5vw, 3rem);
  width: 100%;
}

/* Header bar */
.quiz-header {
  display: flex;
  align-items: center;
  gap: .6rem;
  margin-bottom: 1rem;
}
.back-btn {
  flex-shrink: 0;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-dim);
  border-radius: var(--r-sm);
  padding: 8px 14px;
  cursor: pointer;
  font-size: .82rem;
  font-family: 'Crimson Pro', serif;
  transition: all .15s;
  -webkit-tap-highlight-color: transparent;
  white-space: nowrap;
}
.back-btn:hover, .back-btn:active {
  border-color: var(--purple-l);
  color: var(--text);
  background: rgba(139,70,245,.08);
}
.quiz-title-text {
  font-family: 'Cinzel', serif;
  font-size: clamp(.65rem, 2.2vw, .82rem);
  color: var(--gold);
  font-weight: 600;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
  letter-spacing: .04em;
}

/* Progress */
.prog-row {
  display: flex;
  align-items: center;
  gap: .7rem;
  margin-bottom: 1rem;
}
.progress-track {
  flex: 1;
  height: 5px;
  background: rgba(61,47,110,.6);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--purple), var(--gold-l));
  border-radius: 3px;
  transition: width .45s cubic-bezier(.4,0,.2,1);
  box-shadow: 0 0 8px var(--purple-d);
}
.q-counter {
  font-size: .75rem;
  color: var(--text-mute);
  white-space: nowrap;
  flex-shrink: 0;
  font-family: 'Cinzel', serif;
}

/* Section badge */
.section-badge {
  display: inline-block;
  font-size: clamp(.58rem, 1.8vw, .65rem);
  letter-spacing: .12em;
  color: var(--purple-l);
  border: 1px solid rgba(139,70,245,.3);
  border-radius: 20px;
  padding: 3px 12px;
  margin-bottom: .75rem;
  font-family: 'Cinzel', serif;
  background: rgba(139,70,245,.06);
  text-transform: uppercase;
}

/* Passage */
.passage-label {
  font-size: .65rem;
  color: var(--gold);
  letter-spacing: .1em;
  margin-bottom: .4rem;
  font-family: 'Cinzel', serif;
  text-transform: uppercase;
}
.passage-box {
  background: rgba(15,11,32,.75);
  border: 1px solid rgba(139,70,245,.25);
  border-left: 3px solid var(--purple-d);
  border-radius: var(--r-sm);
  padding: clamp(.75rem, 3vw, 1rem) clamp(.85rem, 3vw, 1.1rem);
  margin-bottom: .9rem;
  font-size: clamp(.78rem, 2.3vw, .88rem);
  line-height: 1.8;
  color: #c8bcee;
  max-height: 210px;
  overflow-y: auto;
  white-space: pre-wrap;
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.passage-box::-webkit-scrollbar { width: 4px; }
.passage-box::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Question */
.q-text {
  font-size: clamp(.9rem, 3vw, 1.05rem);
  line-height: 1.65;
  color: var(--text);
  background: linear-gradient(150deg, var(--card2) 0%, var(--card) 100%);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: clamp(.85rem, 3vw, 1.1rem) clamp(.95rem, 3vw, 1.2rem);
  margin-bottom: 1rem;
  white-space: pre-wrap;
  box-shadow: var(--shadow);
}

/* Choices */
.choices { display: flex; flex-direction: column; gap: .55rem; }
.choice-btn {
  display: flex;
  align-items: flex-start;
  gap: .65rem;
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-sm);
  padding: clamp(.65rem, 2.5vw, .85rem) clamp(.85rem, 3vw, 1.05rem);
  cursor: pointer;
  transition: background .14s, border-color .14s, transform .12s;
  font-size: clamp(.85rem, 2.8vw, .97rem);
  color: var(--text);
  text-align: left;
  font-family: 'Crimson Pro', serif;
  -webkit-tap-highlight-color: transparent;
  line-height: 1.45;
}
.choice-btn:hover:not(:disabled), .choice-btn:active:not(:disabled) {
  border-color: var(--purple-l);
  background: rgba(139,70,245,.1);
  transform: translateX(3px);
}
.choice-label {
  font-family: 'Cinzel', serif;
  font-size: .72rem;
  font-weight: 700;
  color: var(--gold);
  min-width: 22px;
  padding-top: 2px;
  flex-shrink: 0;
}
.choice-text { flex: 1; }
.choice-btn.correct {
  border-color: var(--ok);
  background: var(--ok-bg);
  box-shadow: 0 0 12px rgba(34,197,94,.15);
}
.choice-btn.correct .choice-label { color: var(--ok); }
.choice-btn.wrong {
  border-color: var(--bad);
  background: var(--bad-bg);
}
.choice-btn.wrong .choice-label { color: var(--bad); }
.choice-btn:disabled { cursor: default; transform: none; }

/* Feedback */
.feedback-msg {
  margin-top: .75rem;
  padding: clamp(.6rem, 2vw, .75rem) clamp(.9rem, 3vw, 1.1rem);
  border-radius: var(--r-sm);
  font-size: clamp(.82rem, 2.5vw, .92rem);
  display: none;
  font-style: italic;
}
.feedback-msg.show { display: block; animation: fadein .2s ease; }
@keyframes fadein { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }
.feedback-msg.correct {
  background: var(--ok-bg);
  color: #4ade80;
  border: 1px solid rgba(34,197,94,.3);
}
.feedback-msg.wrong {
  background: var(--bad-bg);
  color: #fb7185;
  border: 1px solid rgba(244,63,94,.3);
}

/* Next button */
.nav-row { display: flex; justify-content: flex-end; margin-top: 1rem; }
.next-btn {
  background: linear-gradient(135deg, var(--purple-d), var(--purple));
  border: none;
  border-radius: var(--r-sm);
  padding: clamp(.7rem, 2.5vw, .85rem) clamp(1.4rem, 4vw, 1.8rem);
  color: #fff;
  font-size: clamp(.88rem, 2.8vw, 1rem);
  font-family: 'Cinzel', serif;
  font-weight: 600;
  letter-spacing: .05em;
  cursor: pointer;
  transition: opacity .15s, transform .12s, box-shadow .15s;
  display: none;
  box-shadow: 0 4px 16px rgba(139,70,245,.35);
  -webkit-tap-highlight-color: transparent;
}
.next-btn.show { display: block; animation: fadein .2s ease; }
.next-btn:hover, .next-btn:active { opacity: .9; transform: translateY(-1px); box-shadow: 0 6px 22px rgba(139,70,245,.45); }

/* ══════════════════════════════════════════
   RESULT SCREEN
══════════════════════════════════════════ */
#result {
  align-items: center;
  justify-content: center;
  padding: clamp(1.5rem, 5vw, 3rem) clamp(1rem, 4vw, 2rem);
  text-align: center;
  min-height: 100vh;
}
.result-inner { max-width: 440px; width: 100%; }
.result-orb {
  font-size: clamp(3rem, 10vw, 4.5rem);
  margin-bottom: .75rem;
  display: block;
  filter: drop-shadow(0 0 20px gold);
  animation: float 3s ease-in-out infinite;
}
.result-exam-name {
  font-family: 'Cinzel', serif;
  font-size: clamp(.78rem, 2.5vw, .95rem);
  color: var(--gold);
  font-weight: 600;
  margin-bottom: .5rem;
  letter-spacing: .05em;
}
.stars-row {
  display: flex;
  justify-content: center;
  gap: 5px;
  margin-bottom: .85rem;
  font-size: clamp(1.2rem, 4vw, 1.6rem);
}
.result-score {
  font-size: clamp(2.5rem, 9vw, 3.5rem);
  font-weight: 700;
  color: var(--purple-l);
  margin: .5rem 0;
  font-family: 'Cinzel', serif;
}
.result-pct {
  font-size: clamp(.82rem, 2.5vw, .95rem);
  color: var(--text-dim);
  margin-bottom: 1.2rem;
}
.rank-badge {
  display: inline-block;
  padding: .45rem 1.4rem;
  border-radius: 30px;
  font-family: 'Cinzel', serif;
  font-size: clamp(.78rem, 2.5vw, .9rem);
  font-weight: 700;
  margin-bottom: 1.5rem;
  letter-spacing: .06em;
}
.result-actions {
  display: flex;
  gap: .75rem;
  justify-content: center;
  flex-wrap: wrap;
}
.result-btn {
  padding: clamp(.65rem, 2.5vw, .8rem) clamp(1.2rem, 4vw, 1.6rem);
  border-radius: var(--r-sm);
  font-size: clamp(.85rem, 2.8vw, 1rem);
  font-family: 'Cinzel', serif;
  font-weight: 600;
  letter-spacing: .04em;
  cursor: pointer;
  transition: all .15s;
  border: none;
  -webkit-tap-highlight-color: transparent;
}
.result-btn:hover, .result-btn:active { opacity: .88; transform: translateY(-1px); }
.btn-retry { background: var(--purple); color: #fff; box-shadow: 0 4px 14px rgba(139,70,245,.3); }
.btn-home  { background: var(--card2); color: var(--text); border: 1px solid var(--border); }

/* ── MOBILE TWEAKS ── */
@media (max-width: 380px) {
  .tome-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 320px) {
  .tome-grid { grid-template-columns: 1fr 1fr; }
  .quiz-inner { padding: .6rem .65rem 2rem; }
}
</style>
</head>
<body>
<div id="app">

  <!-- ══ HOME ══ -->
  <div id="home" class="screen active">
    <span class="home-sigil">🔮</span>
    <h1 class="home-title">Arcane Quiz</h1>
    <p class="home-sub">Luyện thi Tiếng Anh Lớp 6 · NGT &amp; CVA</p>
    <div class="rune-divider">✦ ᛟ ✦ ᚱ ✦ ᛗ ✦</div>
    <p class="home-hint">Đáp án được <span>xáo trộn ngẫu nhiên</span> mỗi lần thi</p>
    <div class="tome-grid">
      <button class="tome-btn" onclick="startExam(0)">
        <span class="tome-icon">📜</span>
        <div class="tome-name">Đề 01</div>
        <div class="tome-school">Nguyễn Gia Thiều</div>
        <div class="tome-count">25 câu · 30 phút</div>
      </button>
      <button class="tome-btn" onclick="startExam(1)">
        <span class="tome-icon">🗝️</span>
        <div class="tome-name">Đề 02</div>
        <div class="tome-school">Chu Văn An</div>
        <div class="tome-count">30 câu · 45 phút</div>
      </button>
      <button class="tome-btn" onclick="startExam(2)">
        <span class="tome-icon">⚗️</span>
        <div class="tome-name">Đề 03</div>
        <div class="tome-school">Nguyễn Gia Thiều</div>
        <div class="tome-count">25 câu · 30 phút</div>
      </button>
      
      <button class="tome-btn gold-tome" onclick="startExam(3)">
        <span class="new-badge">MỚI</span>
        <span class="tome-icon">🏛️</span>
        <div class="tome-name">Đề 04</div>
        <div class="tome-school">Chu Văn An 23-24</div>
        <div class="tome-count">35 câu · 45 phút</div>
      </button>
      <button class="tome-btn gold-tome" onclick="startExam(4)">
        <span class="new-badge">MỚI</span>
        <span class="tome-icon">🌟</span>
        <div class="tome-name">Đề 05</div>
        <div class="tome-school">NGT 24-25</div>
        <div class="tome-count">25 câu · 30 phút</div>
      </button> 
      
    </div>
  </div>

  <!-- ══ QUIZ ══ -->
  <div id="quiz" class="screen">
    <div class="quiz-inner">
      <div class="quiz-header">
        <button class="back-btn" onclick="goHome()">← Về</button>
        <div class="quiz-title-text" id="quiz-title"></div>
      </div>
      <div class="prog-row">
        <div class="progress-track"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        <div class="q-counter" id="q-counter"></div>
      </div>
      <div class="section-badge" id="section-badge"></div>
      <div id="passage-wrap" style="display:none">
        <div class="passage-label">📖 Bài đọc</div>
        <div class="passage-box" id="passage-box"></div>
      </div>
      <div class="q-text" id="q-text"></div>
      <div class="choices" id="choices"></div>
      <div class="feedback-msg" id="feedback"></div>
      <div class="nav-row"><button class="next-btn" id="next-btn" onclick="nextQ()">Tiếp theo ›</button></div>
    </div>
  </div>

  <!-- ══ RESULT ══ -->
  <div id="result" class="screen">
    <div class="result-inner">
      <span class="result-orb" id="r-orb">🏆</span>
      <div class="result-exam-name" id="r-name"></div>
      <div class="stars-row" id="r-stars"></div>
      <div class="result-score" id="r-score"></div>
      <div class="result-pct" id="r-pct"></div>
      <div class="rank-badge" id="r-rank"></div>
      <div class="result-actions">
        <button class="result-btn btn-retry" onclick="retryExam()">🔄 Làm lại</button>
        <button class="result-btn btn-home"  onclick="goHome()">🏠 Trang chủ</button>
      </div>
    </div>
  </div>

</div><!-- #app -->

<script>
/* ══════════════════════════════════════════════════════
   PASSAGES
══════════════════════════════════════════════════════ */
const P_JANE = `Hi Sammy,

I'm here in the United States and having a great time! We arrived ___ Wednesday and visited the Lincoln Memorial and Georgetown. Georgetown is a historic area in Washington, D.C. The food here is great. I ate a hot dog. It's a ___ street food in America. I really liked it. Tomorrow, we're going to the White House with a tour guide and taking a boat trip along the Potomac River. We're going to the National Air and Space Museum on our last day in Washington, D.C. On Friday, we will go to the airport to get a ___ to New York City. I'm looking forward to going on the Staten Island Ferry to see the Statue of Liberty and going to Yankee Stadium. I wish you were here.

const P_PETS = `The importance of pets

const NAMES = [
  "Đề 01 – Nguyễn Gia Thiều (25 câu)",
  "Đề 02 – Chu Văn An (30 câu)",
  "Đề 03 – Nguyễn Gia Thiều (25 câu)",
  "Đề 04 – Chu Văn An 23-24 (35 câu)",
  "Đề 05 – Nguyễn Gia Thiều 24-25 (25 câu)",
];

/* ── Fisher-Yates shuffle ── */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* Build shuffled exam: randomise choice order, track new correct index */
function buildExam(idx) {
  return RAW[idx].map(q => {
    const pairs = q.c.map((txt, i) => ({ txt, orig: i }));
    const sh    = shuffle(pairs);
    return { s: q.s, q: q.q, c: sh.map(p => p.txt), a: sh.findIndex(p => p.orig === q.a), p: q.p || null };
  });
}

/* ── State ── */
let curExam = 0, questions = [], curQ = 0, score = 0, answered = false;

/* ── Helpers ── */
function $id(id) { return document.getElementById(id); }
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  $id(id).classList.add('active');
}

/* ── Start ── */
function startExam(idx) {
  curExam = idx;
  questions = buildExam(idx);
  curQ = 0; score = 0;
  $id('quiz-title').textContent = NAMES[idx];
  showScreen('quiz');
  renderQ();
}

function renderQ() {
  const q = questions[curQ], total = questions.length;

  $id('progress-fill').style.width = ((curQ / total) * 100) + '%';
  $id('q-counter').textContent = (curQ + 1) + ' / ' + total;
  $id('section-badge').textContent = q.s;

  /* passage */
  const pw = $id('passage-wrap'), pb = $id('passage-box');
  if (q.p) { pw.style.display = 'block'; pb.textContent = q.p; pb.scrollTop = 0; }
  else      { pw.style.display = 'none'; }

  $id('q-text').textContent = q.q;

  /* choices */
  const el = $id('choices'); el.innerHTML = '';
  ['A','B','C','D'].forEach((L, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.innerHTML = `<span class="choice-label">${L}</span><span class="choice-text">${q.c[i]}</span>`;
    btn.onclick = () => pick(i);
    el.appendChild(btn);
  });

  $id('feedback').className = 'feedback-msg';
  $id('next-btn').className  = 'next-btn';
  answered = false;

  /* scroll quiz pane to top */
  $id('quiz').scrollTop = 0;
}

function pick(idx) {
  if (answered) return;
  answered = true;
  const q    = questions[curQ];
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b => b.disabled = true);
  const fb = $id('feedback');
  if (idx === q.a) {
    btns[idx].classList.add('correct');
    score++;
    fb.textContent = '✨ Chính xác! Phép thuật thành công!';
    fb.className = 'feedback-msg correct show';
  } else {
    btns[idx].classList.add('wrong');
    btns[q.a].classList.add('correct');
    fb.textContent = '🌑 Chưa đúng. Đáp án đúng là ' + ['A','B','C','D'][q.a] + '.';
    fb.className = 'feedback-msg wrong show';
  }
  $id('next-btn').className = 'next-btn show';
}

function nextQ() {
  curQ++;
  if (curQ >= questions.length) showResult(); else renderQ();
}

function showResult() {
  const total = questions.length, pct = Math.round((score / total) * 100);
  showScreen('result');
  $id('r-name').textContent  = NAMES[curExam];
  $id('r-score').textContent = score + ' / ' + total;
  $id('r-pct').textContent   = 'Tỉ lệ đúng: ' + pct + '%';

  const stars = pct >= 90 ? 5 : pct >= 75 ? 4 : pct >= 60 ? 3 : pct >= 40 ? 2 : 1;
  $id('r-stars').innerHTML = Array.from({length:5}, (_,i) => i < stars ? '⭐' : '☆').join('');

  let orb, rank, rs;
  if      (pct >= 90) { orb='🏆'; rank='Đại Pháp Sư';      rs='background:rgba(200,153,31,.15);color:#f0c84a;border:1px solid rgba(200,153,31,.4)'; }
  else if (pct >= 75) { orb='🔮'; rank='Pháp Sư Cao Cấp';   rs='background:rgba(139,70,245,.15);color:#c084fc;border:1px solid rgba(139,70,245,.4)'; }
  else if (pct >= 60) { orb='⚗️'; rank='Luyện Khí Sĩ';      rs='background:rgba(34,197,94,.1);color:#4ade80;border:1px solid rgba(34,197,94,.3)'; }
  else if (pct >= 40) { orb='📜'; rank='Học Đồ';             rs='background:rgba(59,130,246,.1);color:#60a5fa;border:1px solid rgba(59,130,246,.3)'; }
  else                { orb='🌑'; rank='Tập Sự Mới';          rs='background:rgba(244,63,94,.1);color:#f87171;border:1px solid rgba(244,63,94,.3)'; }

  $id('r-orb').textContent = orb;
  const rb = $id('r-rank');
  rb.textContent = '⚔ ' + rank + ' ⚔';
  rb.style.cssText = rs + ';padding:.45rem 1.4rem;border-radius:30px;font-family:Cinzel,serif;font-size:.88rem;font-weight:700;';
}

function retryExam() { startExam(curExam); }
function goHome()    { showScreen('home'); }
</script>
